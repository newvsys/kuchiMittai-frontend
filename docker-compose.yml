version: "3.9"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: frontend
    working_dir: /app
    ports:
      - "3000:3000"
      - "9229:9229"
    #command: ["node", "--inspect=0.0.0.0:9229", "node_modules/.bin/next", "dev"]  
    command: npm run dev
    volumes:
      - .:/app                 # Sync local files for hot reload
      - /app/node_modules      # Prevent overriding node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true     # Enables file watching inside Docker
      - WATCHPACK_POLLING=true       # Improve Next.js HMR detection
      - DEBUG=*
      - NEXTAUTH_DEBUG=true
    networks:
      - mynetwork
networks:
  mynetwork:
    external: true      